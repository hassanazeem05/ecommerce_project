{% extends 'base.html' %}
{% block content %}

<div class="row">
    <div class="col-md-6">
        <img src="{{ product.image.url }}" class="img-fluid rounded shadow">
    </div>

    <div class="col-md-6">
        <h2 class="fw-bold">{{ product.name }}</h2>
        <h4 class="text-success mt-3">Rs. {{ product.price }}</h4>

        <p class="mt-3">{{ product.description }}</p>

        <p><strong>Stock:</strong> {{ product.stock }}</p>

<form method="POST" action="{% url 'add_to_cart' product.id %}">
    {% csrf_token %}
    <button type="submit" class="btn btn-warning me-2">Add to Cart</button>
</form>

<form method="POST" action="{% url 'buy_now' product.id %}">
    {% csrf_token %}
    <button type="submit" class="btn btn-dark">Buy Now</button>
</form>

    </div>
</div>

{% endblock %}
