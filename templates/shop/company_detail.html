{% extends 'base.html' %}
{% block content %}

<h2 class="fw-bold mb-4">{{ company.name }} Products</h2>

<div class="row">
    {% for product in products %}
        <div class="col-md-4 mb-4">
            <div class="card shadow h-100">
                <img src="{{ product.image.url }}" class="card-img-top" height="200">
                <div class="card-body text-center">
                    <h5>{{ product.name }}</h5>
                    <p class="text-muted">Rs. {{ product.price }}</p>
                    <a href="{% url 'product_detail' product.slug %}" class="btn btn-dark">
                        View Details
                    </a>
                </div>
            </div>
        </div>
    {% empty %}
        <p>No products available.</p>
    {% endfor %}
</div>

{% endblock %}
