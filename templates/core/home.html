{% extends 'base.html' %}
{% block content %}

<h2 class="mb-4 fw-bold">Shop by Categories</h2>

<div class="row">
    {% for category in categories %}
        <div class="col-md-4 mb-4">
            <div class="card shadow h-100">
                {% if category.image %}
                    <img src="{{ category.image.url }}" class="card-img-top" height="200">
                {% endif %}
                <div class="card-body text-center">
                    <h5 class="card-title">{{ category.name }}</h5>
                    <a href="{% url 'category_detail' category.slug %}" class="btn btn-dark mt-2">
                        View Companies
                    </a>
                </div>
            </div>
        </div>
    {% endfor %}
</div>

{% endblock %}
